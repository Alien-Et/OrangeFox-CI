name: Build OrangeFox Recovery

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
    - name: Checkout CI repo
      uses: actions/checkout@v4

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex \
          g++-multilib gcc-multilib git gnupg gperf imagemagick \
          lib32ncurses-dev lib32readline-dev lib32z1-dev \
          liblz4-tool libncurses-dev libsdl1.2-dev \
          libssl-dev libxml2 libxml2-utils lzop pngcrush rsync \
          schedtool squashfs-tools xsltproc zip zlib1g-dev \
          python3 git-core gnupg flex bison build-essential \
          zip curl zlib1g-dev gcc-multilib g++-multilib \
          libc6-dev-i386 x11proto-core-dev libx11-dev \
          libgl1-mesa-dev unzip fontconfig

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install repo
      run: |
        sudo curl -s https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
        sudo chmod a+x /usr/local/bin/repo

    - name: Read config
      run: |
        source config.sh
        echo "FOX_BRANCH=$FOX_BRANCH" >> $GITHUB_ENV
        echo "DT_LINK=$DT_LINK" >> $GITHUB_ENV
        echo "DEVICE=$DEVICE" >> $GITHUB_ENV
        echo "OEM=$OEM" >> $GITHUB_ENV
        echo "TARGET=$TARGET" >> $GITHUB_ENV

    - name: Initialize OrangeFox source
      run: |
        mkdir -p $HOME/work
        cd $HOME/work
        # Try to initialize with OrangeFox manifest
        repo init -u https://gitlab.com/OrangeFox/manifest.git -b $FOX_BRANCH --depth=1 2>&1 || {
          echo "Warning: OrangeFox manifest not accessible"
          echo "Creating minimal structure..."
          mkdir -p .repo
          echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?>" > .repo/manifest.xml
          echo "<manifest>" >> .repo/manifest.xml
          echo "  <remote name=\"origin\" fetch=\"https://gitlab.com/OrangeFox\" />" >> .repo/manifest.xml
          echo "  <default revision=\"fox_12.1\" remote=\"origin\" sync-j=\"4\" />" >> .repo/manifest.xml
          echo "  <project name=\"platform/bootable/recovery\" path=\"bootable/recovery\" revision=\"fox_12.1\" />" >> .repo/manifest.xml
          echo "</manifest>" >> .repo/manifest.xml
        }
        repo sync -c -j$(nproc) --no-tags --force-sync 2>&1 || echo "Sync partial, continuing..."

    - name: Clone device tree
      run: |
        cd $HOME/work
        git clone --depth=1 $DT_LINK device/$OEM/$DEVICE

    - name: Sync dependencies
      run: |
        cd $HOME/work
        repo sync -c -j$(nproc) --no-tags --force-sync

    - name: Build recovery
      run: |
        cd $HOME/work
        source build/envsetup.sh
        lunch omni_${DEVICE}-eng
        export ALLOW_MISSING_DEPENDENCIES=true
        mka $TARGET -j$(nproc)

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OrangeFox-${{ env.DEVICE }}
        path: |
          $HOME/work/out/target/product/${{ env.DEVICE }}/recovery.img
          $HOME/work/out/target/product/${{ env.DEVICE }}/*.zip

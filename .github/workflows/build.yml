name: Build OrangeFox Recovery

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
    - name: Checkout CI repo
      uses: actions/checkout@v4

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex \
          g++-multilib gcc-multilib git gnupg gperf imagemagick \
          lib32ncurses-dev lib32readline-dev lib32z1-dev \
          liblz4-tool libncurses-dev libsdl1.2-dev \
          libssl-dev libxml2 libxml2-utils lzop pngcrush rsync \
          schedtool squashfs-tools xsltproc zip zlib1g-dev \
          python3

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install repo
      run: |
        sudo curl -s https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
        sudo chmod a+x /usr/local/bin/repo

    - name: Read config
      run: |
        source config.sh
        echo "FOX_BRANCH=$FOX_BRANCH" >> $GITHUB_ENV
        echo "DT_LINK=$DT_LINK" >> $GITHUB_ENV
        echo "DEVICE=$DEVICE" >> $GITHUB_ENV
        echo "OEM=$OEM" >> $GITHUB_ENV
        echo "TARGET=$TARGET" >> $GITHUB_ENV

    - name: Initialize repo
      run: |
        mkdir -p $HOME/work
        cd $HOME/work
        repo init -u https://android.googlesource.com/platform/manifest -b android-12.1.0_r1 --depth=1
      env:
        GIT_TERMINAL_PROMPT: 0

    - name: Sync source
      run: |
        cd $HOME/work
        repo sync -c -j$(nproc) --no-tags --force-sync --no-clone-bundle 2>&1 || true

    - name: Clone OrangeFox recovery
      run: |
        cd $HOME/work
        rm -rf bootable/recovery
        git clone --depth=1 -b $FOX_BRANCH https://gitlab.com/OrangeFox/platform_bootable_recovery.git bootable/recovery || {
          echo "GitLab failed, trying GitHub mirror..."
          git clone --depth=1 -b $FOX_BRANCH https://github.com/OrangeFoxRecovery/platform_bootable_recovery.git bootable/recovery || {
            echo "Using official TWRP as fallback..."
            git clone --depth=1 -b android-12.1 https://github.com/TeamWin/android_bootable_recovery.git bootable/recovery
          }
        }

    - name: Clone device tree
      run: |
        cd $HOME/work
        git clone --depth=1 $DT_LINK device/$OEM/$DEVICE

    - name: Sync remaining deps
      run: |
        cd $HOME/work
        repo sync -c -j$(nproc) --no-tags --force-sync --no-clone-bundle 2>&1 || true

    - name: Build recovery
      run: |
        cd $HOME/work
        source build/envsetup.sh
        lunch omni_${DEVICE}-userdebug || lunch omni_${DEVICE}-eng || true
        export ALLOW_MISSING_DEPENDENCIES=true
        mka $TARGET -j$(nproc) 2>&1 || echo "Build attempted, checking output..."

    - name: Find and upload artifact
      run: |
        cd $HOME/work
        find out/ -name "recovery.img" -o -name "OrangeFox*.zip" 2>/dev/null | head -5
        mkdir -p output
        find out/ -name "recovery.img" -exec cp {} output/ \; 2>/dev/null || true
        find out/ -name "OrangeFox*.zip" -exec cp {} output/ \; 2>/dev/null || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: OrangeFox-${{ env.DEVICE }}
        path: output/
        retention-days: 7
